# The Garden is built from this concept → paper map.
# Each concept may appear as a Concept Fork inside one or more paper bodies:
#   <span class="fork-link" data-fork="concept name">…visible text…</span>
# `papers` lists paper `id`s (the `id:` frontmatter on _papers/*.md).
# `wash` is one of the --wash-* tokens; it tints the fork panel orb.

"cortical down-state":
  wash: "--wash-plum"
  papers: [k-complex]
  blurb: "A brief, profound silence of neuronal firing — the negative half of the cortical slow oscillation. In humans it appears, isolated, as the K-complex."
"multiunit firing":
  wash: "--wash-plum"
  papers: [k-complex]
  blurb: "The pooled spiking activity of many neurons recorded at a single electrode. Goes to zero during a down-state."
"dendritic current":
  wash: "--wash-plum"
  papers: [k-complex, meg-spectra]
  blurb: "The transmembrane current along the dendritic tree that is the dominant source of extracellular field potentials."
"down-state":
  wash: "--wash-plum"
  papers: [k-complex]
  blurb: "See cortical down-state. The label preferred when describing the slow oscillation in animal preparations."
"focal asynchronous oscillation":
  wash: "--wash-slate"
  papers: [spindle-async, spindle-divergent, spindle-emergence]
  blurb: "A spindle observed in MEG but not yet in EEG — a single cortical patch oscillating before global recruitment."
"thalamocortical matrix":
  wash: "--wash-slate"
  papers: [spindle-async, spindle-divergent]
  blurb: "The diffusely-projecting thalamocortical system that synchronises broad cortical territory."
"thalamocortical core":
  wash: "--wash-slate"
  papers: [spindle-async, spindle-divergent]
  blurb: "The focally-projecting thalamocortical system that writes specific content into a single cortical patch."
"EEG/MEG asynchrony":
  wash: "--wash-slate"
  papers: [spindle-async]
  blurb: "The disagreement between EEG and MEG over whether a spindle is synchronous — informative, not noise."
"distributed source modelling":
  wash: "--wash-teal"
  papers: [spindle-divergent]
  blurb: "An inverse-problem method that places thousands of dipoles on the cortical surface and lets the data choose which fire."
"synchronous wave":
  wash: "--wash-oxblood"
  papers: [spindle-emergence]
  blurb: "The global, EEG-visible appearance of a spindle once enough cortical territory has been recruited."
"recruitment time":
  wash: "--wash-oxblood"
  papers: [spindle-emergence]
  blurb: "The ~200 ms latency between a focal MEG spindle and its global EEG counterpart — the time the cortex takes to ignite."
"travelling frequency front":
  wash: "--wash-dust"
  papers: [spindle-topo]
  blurb: "A spindle whose central frequency drifts spatially across the cortex over its lifetime."
"spatially-propagating oscillator":
  wash: "--wash-dust"
  papers: [spindle-topo]
  blurb: "A model in which spindle frequency is set by local cortical properties that vary in space, not by a single thalamic clock."
"purely resistive":
  wash: "--wash-plum"
  papers: [meg-spectra]
  blurb: "An extracellular medium whose impedance is the same at every frequency. The standard simplifying assumption — and, we argue, wrong."
"non-resistive extracellular medium":
  wash: "--wash-plum"
  papers: [meg-spectra]
  blurb: "A medium whose impedance varies with frequency. Implies most forward models are systematically biased."
"renormalisation-group":
  wash: "--wash-slate"
  papers: [depth-coarse-graining]
  blurb: "A flow through theory space that integrates out short-distance physics to reveal effective long-distance behaviour. The mathematical heart of the depth-as-coarse-graining proposal."
"coarse-graining":
  wash: "--wash-slate"
  papers: [depth-coarse-graining]
  blurb: "Any operation that throws away short-scale degrees of freedom while preserving long-scale ones. Each MLP layer is, we claim, an instance."
"RG flow":
  wash: "--wash-slate"
  papers: [depth-coarse-graining]
  blurb: "The trajectory of an effective theory under successive coarse-grainings."
"information-bottleneck":
  wash: "--wash-slate"
  papers: [depth-coarse-graining]
  blurb: "A formalism that describes the compression-relevance trade-off across layers of a deep network."
